name: build-wheels

# Baut native llama-cpp-python-Wheels fuer den Senity-SpeechFlow-Runtime-Katalog
# (runtime.json, #1987). Pro Plattform/Arch ein Wheel mit dem Token-Schema aus
# speechflow/hardware.py: <os>-<arch>[-cuda]-cp<pyver>. CPU-Tokens: CPython 3.13
# (cp313). Ausnahme: das CUDA-Wheel win-amd64-cuda-cp311 ist cp311 (SPEECH-2248),
# weil die App Python 3.11 buendelt und nur dort -cuda angefragt wird.
#
# Strategie: cibuildwheel baut direkt aus dem PyPI-sdist von llama-cpp-python.
# Das gibt einheitlich: manylinux-Repair (Linux), delocate (macOS) und ein
# niedriges Deployment-Target (macOS 11.0 statt der Runner-Version 14/13).
# x86-Builds sind AVX2-Baseline (GGML_NATIVE=OFF, AVX512 aus), damit sie auf
# jeder x86-64-CPU seit ~2013 laufen (sonst STATUS_ILLEGAL_INSTRUCTION, #1987).
#
# Download der Artefakte -> nach hetzner unter <MODELS_DIR>/runtime/<token>/
# hochladen -> dort scripts/gen_runtime_catalog.py signiert runtime.json neu.

on:
  workflow_dispatch:
    inputs:
      llama_version:
        description: "llama-cpp-python Version (PyPI sdist)"
        default: "0.3.30"
        required: true
      platforms:
        description: "Welche Tokens bauen"
        type: choice
        default: "all"
        options:
          - all
          - mac-only
          - mac-arm64
          - mac-x86_64
          - win
          - win-cuda
          - linux
  # Git-Trigger: ein Tag der Form build-<version>-<platforms> startet den Build
  # ueber den Deploy-Key, ohne API-Rechte. Beispiele:
  #   build-0.3.30-all  /  build-0.3.31-mac-only  /  build-0.3.30-win
  push:
    tags:
      - "build-*"

permissions:
  contents: read

jobs:
  # Loest Version + Plattformen auf - aus workflow_dispatch-Inputs ODER aus dem
  # Tag-Namen (build-<version>-<platforms>). Faellt auf Defaults zurueck.
  setup:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.r.outputs.version }}
      platforms: ${{ steps.r.outputs.platforms }}
    steps:
      - id: r
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ver='${{ github.event.inputs.llama_version }}'
            plat='${{ github.event.inputs.platforms }}'
          else
            tag="${GITHUB_REF_NAME}"      # z.B. build-0.3.30-mac-only
            rest="${tag#build-}"           # 0.3.30-mac-only
            ver="${rest%%-*}"              # 0.3.30 (vor dem ersten -)
            plat="${rest#*-}"              # mac-only (nach dem ersten -)
            [ "$plat" = "$rest" ] && plat="all"   # kein platforms-Teil im Tag
          fi
          [ -z "$ver" ] && ver="0.3.30"
          [ -z "$plat" ] && plat="all"
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          echo "platforms=$plat" >> "$GITHUB_OUTPUT"
          echo "Aufgeloest: version=$ver platforms=$plat (event=${{ github.event_name }})"

  build:
    needs: setup
    name: ${{ matrix.token }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - token: mac-arm64-cp313
            os: macos-14
            archs: arm64
            group: mac-arm64
            cibw_environment: >-
              CMAKE_ARGS="-DGGML_METAL=ON -DGGML_NATIVE=OFF -DLLAMA_CURL=OFF -DCMAKE_DISABLE_FIND_PACKAGE_OpenSSL=ON"
              FORCE_CMAKE=1
          # x86_64 wird per CROSS-COMPILE auf dem arm64-Runner (macos-14) gebaut,
          # weil der Intel-Runner macos-13 auf Free-Public-Repos chronisch
          # ausgehungert ist (Job blieb 8h queued). scikit-build-core uebersetzt
          # CIBW_ARCHS=x86_64 -> CMAKE_OSX_ARCHITECTURES; cibuildwheel skippt die
          # Import-Tests bei Arch-Mismatch automatisch. minos = SDK des Runners.
          - token: mac-x86_64-cp313
            os: macos-14
            archs: x86_64
            group: mac-x86_64
            cibw_environment: >-
              CMAKE_ARGS="-DGGML_NATIVE=OFF -DGGML_AVX2=ON -DGGML_AVX512=OFF -DGGML_METAL=OFF -DGGML_ACCELERATE=OFF -DCMAKE_OSX_ARCHITECTURES=x86_64 -DLLAMA_CURL=OFF -DCMAKE_DISABLE_FIND_PACKAGE_OpenSSL=ON"
              FORCE_CMAKE=1
          - token: win-amd64-cp313
            os: windows-latest
            archs: AMD64
            group: win
            cibw_environment: >-
              CMAKE_ARGS="-DGGML_NATIVE=OFF -DGGML_AVX2=ON -DGGML_AVX512=OFF"
              FORCE_CMAKE=1
          - token: linux-x86_64-cp313
            os: ubuntu-latest
            archs: x86_64
            group: linux
            cibw_environment: >-
              CMAKE_ARGS="-DGGML_NATIVE=OFF -DGGML_AVX2=ON -DGGML_AVX512=OFF -DGGML_OPENMP=OFF -DLLAMA_CURL=OFF -DCMAKE_DISABLE_FIND_PACKAGE_OpenSSL=ON"
              FORCE_CMAKE=1
              LDFLAGS="-static-libstdc++ -static-libgcc"
          # CUDA-Variante (SPEECH-2248): GPU-beschleunigtes Windows-Wheel.
          # Bewusst cp311 (NICHT cp313 wie die CPU-Tokens): die SpeechFlow-App
          # buendelt Python 3.11, der Client fragt daher win-amd64-cuda-cp311 an
          # (speechflow/hardware.runtime_token: -cuda nur fuer win+amd64).
          # GGML_CUDA=on aktiviert das CUDA-Backend; die AVX2-Baseline bleibt fuer
          # den CPU-Fallback-Code erhalten (kein AVX512), CMAKE_CUDA_ARCHITECTURES
          # all-major deckt Maxwell..Hopper ab, ohne fuer jede Minor-SM zu bauen.
          - token: win-amd64-cuda-cp311
            # Bewusst windows-2022 statt windows-latest: letzteres zeigt seit
            # Juni 2026 auf windows-2025-vs2026 (Server 2025, Build 26100,
            # Visual Studio 2026). Der CUDA-12.4.1-Installer kennt weder dieses
            # OS noch die VS2026-Integration und crasht beim Entpacken
            # (visual_studio_integration_12.4, exit 3772776473, Run 28336767329).
            # CUDA 12.4 + VS2022 auf windows-2022 ist die validierte Kombination.
            os: windows-2022
            archs: AMD64
            group: win-cuda
            py: "3.11"
            cibw_build: "cp311-*"
            cuda: "12.4.1"
            cibw_environment: >-
              CMAKE_ARGS="-DGGML_CUDA=on -DGGML_NATIVE=OFF -DGGML_AVX2=ON -DGGML_AVX512=OFF -DCMAKE_CUDA_ARCHITECTURES=all-major"
              FORCE_CMAKE=1
            # Das CUDA-Wheel braucht cudart64_12 + cublas64_12/cublasLt64_12
            # eingebettet, sonst laedt es auf einem Rechner ohne installiertes
            # CUDA-Toolkit nicht (der NVIDIA-Treiber allein liefert cublas NICHT).
            # delvewheel vendort diese DLLs ins Wheel; --no-mangle-all laesst die
            # ko-gebundelten llama-DLLs (libllama/libggml*) unangetastet, die sich
            # gegenseitig ueber feste Namen laden. Jimver/cuda-toolkit haengt das
            # CUDA-bin an PATH, daher findet delvewheel cudart/cublas dort.
            cibw_repair_windows: >-
              delvewheel repair --no-mangle-all -w {dest_dir} {wheel}

    steps:
      - name: Plattform-Filter
        id: filter
        shell: bash
        run: |
          want='${{ needs.setup.outputs.platforms }}'
          grp='${{ matrix.group }}'
          build=no
          case "$want" in
            all) build=yes ;;
            mac-only) [[ "$grp" == mac-* ]] && build=yes ;;
            *) [[ "$grp" == "$want" ]] && build=yes ;;
          esac
          echo "build=$build" >> "$GITHUB_OUTPUT"
          echo "Token=${{ matrix.token }} group=$grp want=$want -> build=$build"

      - name: Python (matrix.py, Default 3.13)
        if: steps.filter.outputs.build == 'yes'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.py || '3.13' }}

      # CUDA-Toolkit nur fuer CUDA-Tokens. Jimver/cuda-toolkit setzt CUDA_PATH +
      # haengt nvcc an PATH/GITHUB_PATH; cibuildwheel laeuft auf Windows nativ
      # (kein Container) und erbt die Runner-Umgebung, daher findet CMake die
      # CUDAToolkit ueber GGML_CUDA=on. method=network + sub-packages spart die
      # ~3 GB des Full-Installers (Runner-Disk + Zeit).
      - name: CUDA-Toolkit (nur CUDA-Token)
        if: steps.filter.outputs.build == 'yes' && matrix.cuda != ''
        uses: Jimver/cuda-toolkit@v0.2.19
        with:
          cuda: ${{ matrix.cuda }}
          method: network
          sub-packages: '["nvcc", "cudart", "cccl", "cublas", "cublas_dev", "thrust", "visual_studio_integration"]'

      - name: cibuildwheel + sdist holen
        if: steps.filter.outputs.build == 'yes'
        shell: bash
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip
          python -m pip install "cibuildwheel==2.21.3"
          python -m pip download "llama-cpp-python==${{ needs.setup.outputs.version }}" \
            --no-binary :all: --no-deps -d sdist
          ls -la sdist

      - name: Wheel bauen
        if: steps.filter.outputs.build == 'yes'
        shell: bash
        env:
          CIBW_BUILD: ${{ matrix.cibw_build || 'cp313-*' }}
          CIBW_SKIP: "*musllinux*"
          CIBW_ARCHS: ${{ matrix.archs }}
          CIBW_ENVIRONMENT: ${{ matrix.cibw_environment }}
          # Bewaehrtes 2_28-Image mit altem Interpreter-Layout (cibuildwheel
          # 2.21.3 kann das neue manylinux-interpreters-Layout der :latest-Images
          # NICHT). Die "too-recent symbols" der 2_28-Policy umgehen wir, indem
          # libstdc++/libgcc STATISCH gelinkt werden (LDFLAGS oben) -> keine
          # externe libstdc++-Abhaengigkeit -> auditwheel repariert auf glibc 2.28.
          CIBW_MANYLINUX_X86_64_IMAGE: "quay.io/pypa/manylinux_2_28_x86_64:2024.10.07-1"
          # llama.cpp splittet die Lib in viele ko-gebundelte @rpath-dylibs
          # (libggml*, libllama*); delocate kann sie im Temp nicht aufloesen und
          # bricht ab, obwohl real nichts fehlt. --ignore-missing-dependencies
          # ist der Weg der offiziellen llama-cpp-python-Wheels.
          CIBW_REPAIR_WHEEL_COMMAND_MACOS: >-
            delocate-wheel --require-archs {delocate_archs}
            --ignore-missing-dependencies -w {dest_dir} -v {wheel}
          # Linux: auditwheel-Repair GANZ ueberspringen. Das Wheel ist bereits
          # self-contained: libstdc++/libgcc statisch (LDFLAGS), OpenMP aus (kein
          # libgomp), curl/OpenSSL aus (kein libssl) -> keine externen Deps ausser
          # glibc-Basis. Die internen lib{llama,ggml,mtmd}*.so laden via $ORIGIN.
          # auditwheel konnte die ko-gebundelten Libs ohnehin nicht aufloesen.
          # Wheel bleibt linux_x86_64 (glibc 2.28 vom Build-Image) - fuer den
          # direkten Katalog-Install voellig ausreichend.
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: ""
          # Windows: per Default kein Repair (CPU-Tokens bringen ihre DLLs schon
          # ko-gebundelt mit). Nur das CUDA-Token setzt matrix.cibw_repair_windows
          # und vendort damit die CUDA-Runtime-DLLs ins Wheel (siehe Matrix-Kommentar).
          CIBW_REPAIR_WHEEL_COMMAND_WINDOWS: ${{ matrix.cibw_repair_windows || '' }}
          CIBW_BUILD_VERBOSITY: "1"
          # llama.cpp braucht etwas Build-Zeit; ein Wheel pro Token reicht.
          CIBW_BEFORE_BUILD: "pip install cmake ninja"
        run: |
          set -euxo pipefail
          if [ "$RUNNER_OS" = "macOS" ]; then
            # llama.cpp erzwingt den SDK-Min und ignoriert ein NIEDRIGERES
            # Deployment-Target. Das Wheel deshalb ehrlich mit dem REALEN
            # Runner-SDK-Min taggen, sonst bricht delocate ab
            # ("Library dependencies do not satisfy target MacOS version").
            export MACOSX_DEPLOYMENT_TARGET="$(xcrun --show-sdk-version | cut -d. -f1).0"
            echo "minos -> MACOSX_DEPLOYMENT_TARGET=$MACOSX_DEPLOYMENT_TARGET (SDK $(xcrun --show-sdk-version))"
          fi
          sdist_tar=$(ls sdist/llama_cpp_python-*.tar.gz)
          python -m cibuildwheel --output-dir wheelhouse "$sdist_tar"
          echo "=== gebaute Wheels ==="
          ls -la wheelhouse

      - name: Artefakt hochladen (${{ matrix.token }})
        if: steps.filter.outputs.build == 'yes'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.token }}
          path: wheelhouse/*.whl
          if-no-files-found: error
