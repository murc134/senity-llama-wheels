name: build-wheels

# Baut native llama-cpp-python-Wheels fuer den Senity-SpeechFlow-Runtime-Katalog
# (runtime.json, #1987). Pro Plattform/Arch ein Wheel mit dem Token-Schema aus
# speechflow/hardware.py: <os>-<arch>[-cuda]-cp<pyver>. CPU-Tokens: CPython 3.13
# (cp313). Ausnahme: das CUDA-Wheel win-amd64-cuda-cp311 ist cp311 (SPEECH-2248),
# weil die App Python 3.11 buendelt und nur dort -cuda angefragt wird.
#
# Strategie: cibuildwheel baut direkt aus dem PyPI-sdist von llama-cpp-python.
# Das gibt einheitlich: manylinux-Repair (Linux), delocate (macOS) und ein
# niedriges Deployment-Target (macOS 11.0 statt der Runner-Version 14/13).
# x86-Builds sind AVX2-Baseline (GGML_NATIVE=OFF, AVX512 aus), damit sie auf
# jeder x86-64-CPU seit ~2013 laufen (sonst STATUS_ILLEGAL_INSTRUCTION, #1987).
#
# Download der Artefakte -> nach hetzner unter <MODELS_DIR>/runtime/<token>/
# hochladen -> dort scripts/gen_runtime_catalog.py signiert runtime.json neu.

on:
  workflow_dispatch:
    inputs:
      llama_version:
        description: "llama-cpp-python Version (PyPI sdist)"
        default: "0.3.30"
        required: true
      platforms:
        description: "Welche Tokens bauen"
        type: choice
        default: "all"
        options:
          - all
          - mac-only
          - mac-arm64
          - mac-x86_64
          - win
          - win-cuda
          - linux
  # Git-Trigger: ein Tag der Form build-<version>-<platforms> startet den Build
  # ueber den Deploy-Key, ohne API-Rechte. Beispiele:
  #   build-0.3.30-all  /  build-0.3.31-mac-only  /  build-0.3.30-win
  push:
    tags:
      - "build-*"

permissions:
  contents: read

jobs:
  # Loest Version + Plattformen auf - aus workflow_dispatch-Inputs ODER aus dem
  # Tag-Namen (build-<version>-<platforms>). Faellt auf Defaults zurueck.
  setup:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.r.outputs.version }}
      platforms: ${{ steps.r.outputs.platforms }}
    steps:
      - id: r
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ver='${{ github.event.inputs.llama_version }}'
            plat='${{ github.event.inputs.platforms }}'
          else
            tag="${GITHUB_REF_NAME}"      # z.B. build-0.3.30-mac-only
            rest="${tag#build-}"           # 0.3.30-mac-only
            ver="${rest%%-*}"              # 0.3.30 (vor dem ersten -)
            plat="${rest#*-}"              # mac-only (nach dem ersten -)
            [ "$plat" = "$rest" ] && plat="all"   # kein platforms-Teil im Tag
          fi
          [ -z "$ver" ] && ver="0.3.30"
          [ -z "$plat" ] && plat="all"
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          echo "platforms=$plat" >> "$GITHUB_OUTPUT"
          echo "Aufgeloest: version=$ver platforms=$plat (event=${{ github.event_name }})"

  build:
    needs: setup
    name: ${{ matrix.token }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - token: mac-arm64-cp313
            os: macos-14
            archs: arm64
            group: mac-arm64
            cibw_environment: >-
              CMAKE_ARGS="-DGGML_METAL=ON -DGGML_NATIVE=OFF -DLLAMA_CURL=OFF -DCMAKE_DISABLE_FIND_PACKAGE_OpenSSL=ON"
              FORCE_CMAKE=1
          # x86_64 wird per CROSS-COMPILE auf dem arm64-Runner (macos-14) gebaut,
          # weil der Intel-Runner macos-13 auf Free-Public-Repos chronisch
          # ausgehungert ist (Job blieb 8h queued). scikit-build-core uebersetzt
          # CIBW_ARCHS=x86_64 -> CMAKE_OSX_ARCHITECTURES; cibuildwheel skippt die
          # Import-Tests bei Arch-Mismatch automatisch. minos = SDK des Runners.
          - token: mac-x86_64-cp313
            os: macos-14
            archs: x86_64
            group: mac-x86_64
            cibw_environment: >-
              CMAKE_ARGS="-DGGML_NATIVE=OFF -DGGML_AVX2=ON -DGGML_AVX512=OFF -DGGML_METAL=OFF -DGGML_ACCELERATE=OFF -DCMAKE_OSX_ARCHITECTURES=x86_64 -DLLAMA_CURL=OFF -DCMAKE_DISABLE_FIND_PACKAGE_OpenSSL=ON"
              FORCE_CMAKE=1
          - token: win-amd64-cp313
            os: windows-latest
            archs: AMD64
            group: win
            cibw_environment: >-
              CMAKE_ARGS="-DGGML_NATIVE=OFF -DGGML_AVX2=ON -DGGML_AVX512=OFF"
              FORCE_CMAKE=1
          - token: linux-x86_64-cp313
            os: ubuntu-latest
            archs: x86_64
            group: linux
            cibw_environment: >-
              CMAKE_ARGS="-DGGML_NATIVE=OFF -DGGML_AVX2=ON -DGGML_AVX512=OFF -DGGML_OPENMP=OFF -DLLAMA_CURL=OFF -DCMAKE_DISABLE_FIND_PACKAGE_OpenSSL=ON"
              FORCE_CMAKE=1
              LDFLAGS="-static-libstdc++ -static-libgcc"
          # Das CUDA-Wheel (win-amd64-cuda-cp311) wird NICHT hier in der
          # cibuildwheel-Matrix gebaut, sondern im eigenen Job build-cuda weiter
          # unten - der GPU-Build braucht einen komplett anderen Toolchain-Weg
          # (conda/mamba CUDA vom nvidia-Channel + MSVC + Ninja + pip wheel +
          # delvewheel) als die CPU-Tokens. Siehe Kommentar an build-cuda.

    steps:
      - name: Plattform-Filter
        id: filter
        shell: bash
        run: |
          want='${{ needs.setup.outputs.platforms }}'
          grp='${{ matrix.group }}'
          build=no
          case "$want" in
            all) build=yes ;;
            mac-only) [[ "$grp" == mac-* ]] && build=yes ;;
            *) [[ "$grp" == "$want" ]] && build=yes ;;
          esac
          echo "build=$build" >> "$GITHUB_OUTPUT"
          echo "Token=${{ matrix.token }} group=$grp want=$want -> build=$build"

      - name: Python (matrix.py, Default 3.13)
        if: steps.filter.outputs.build == 'yes'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.py || '3.13' }}

      - name: cibuildwheel + sdist holen
        if: steps.filter.outputs.build == 'yes'
        shell: bash
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip
          python -m pip install "cibuildwheel==2.21.3"
          python -m pip download "llama-cpp-python==${{ needs.setup.outputs.version }}" \
            --no-binary :all: --no-deps -d sdist
          ls -la sdist

      - name: Wheel bauen
        if: steps.filter.outputs.build == 'yes'
        shell: bash
        env:
          CIBW_BUILD: ${{ matrix.cibw_build || 'cp313-*' }}
          CIBW_SKIP: "*musllinux*"
          CIBW_ARCHS: ${{ matrix.archs }}
          CIBW_ENVIRONMENT: ${{ matrix.cibw_environment }}
          # Bewaehrtes 2_28-Image mit altem Interpreter-Layout (cibuildwheel
          # 2.21.3 kann das neue manylinux-interpreters-Layout der :latest-Images
          # NICHT). Die "too-recent symbols" der 2_28-Policy umgehen wir, indem
          # libstdc++/libgcc STATISCH gelinkt werden (LDFLAGS oben) -> keine
          # externe libstdc++-Abhaengigkeit -> auditwheel repariert auf glibc 2.28.
          CIBW_MANYLINUX_X86_64_IMAGE: "quay.io/pypa/manylinux_2_28_x86_64:2024.10.07-1"
          # llama.cpp splittet die Lib in viele ko-gebundelte @rpath-dylibs
          # (libggml*, libllama*); delocate kann sie im Temp nicht aufloesen und
          # bricht ab, obwohl real nichts fehlt. --ignore-missing-dependencies
          # ist der Weg der offiziellen llama-cpp-python-Wheels.
          CIBW_REPAIR_WHEEL_COMMAND_MACOS: >-
            delocate-wheel --require-archs {delocate_archs}
            --ignore-missing-dependencies -w {dest_dir} -v {wheel}
          # Linux: auditwheel-Repair GANZ ueberspringen. Das Wheel ist bereits
          # self-contained: libstdc++/libgcc statisch (LDFLAGS), OpenMP aus (kein
          # libgomp), curl/OpenSSL aus (kein libssl) -> keine externen Deps ausser
          # glibc-Basis. Die internen lib{llama,ggml,mtmd}*.so laden via $ORIGIN.
          # auditwheel konnte die ko-gebundelten Libs ohnehin nicht aufloesen.
          # Wheel bleibt linux_x86_64 (glibc 2.28 vom Build-Image) - fuer den
          # direkten Katalog-Install voellig ausreichend.
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: ""
          # Windows: per Default kein Repair (CPU-Tokens bringen ihre DLLs schon
          # ko-gebundelt mit). Nur das CUDA-Token setzt matrix.cibw_repair_windows
          # und vendort damit die CUDA-Runtime-DLLs ins Wheel (siehe Matrix-Kommentar).
          CIBW_REPAIR_WHEEL_COMMAND_WINDOWS: ${{ matrix.cibw_repair_windows || '' }}
          CIBW_BUILD_VERBOSITY: "1"
          # llama.cpp braucht etwas Build-Zeit; ein Wheel pro Token reicht.
          CIBW_BEFORE_BUILD: "pip install cmake ninja"
        run: |
          set -euxo pipefail
          if [ "$RUNNER_OS" = "macOS" ]; then
            # llama.cpp erzwingt den SDK-Min und ignoriert ein NIEDRIGERES
            # Deployment-Target. Das Wheel deshalb ehrlich mit dem REALEN
            # Runner-SDK-Min taggen, sonst bricht delocate ab
            # ("Library dependencies do not satisfy target MacOS version").
            export MACOSX_DEPLOYMENT_TARGET="$(xcrun --show-sdk-version | cut -d. -f1).0"
            echo "minos -> MACOSX_DEPLOYMENT_TARGET=$MACOSX_DEPLOYMENT_TARGET (SDK $(xcrun --show-sdk-version))"
          fi
          sdist_tar=$(ls sdist/llama_cpp_python-*.tar.gz)
          python -m cibuildwheel --output-dir wheelhouse "$sdist_tar"
          echo "=== gebaute Wheels ==="
          ls -la wheelhouse

      - name: Artefakt hochladen (${{ matrix.token }})
        if: steps.filter.outputs.build == 'yes'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.token }}
          path: wheelhouse/*.whl
          if-no-files-found: error

  # CUDA-Wheel (win-amd64-cuda-cp311, SPEECH-2248) - GPU-beschleunigtes Windows-
  # Wheel fuer die in-process-LLM-Runtime der SpeechFlow-App. Bewusst cp311
  # (NICHT cp313 wie die CPU-Tokens): die App buendelt Python 3.11, der Client
  # fragt daher genau win-amd64-cuda-cp311 an (speechflow/hardware.runtime_token,
  # -cuda nur fuer win+amd64+NVIDIA). Die ABI des Wheels MUSS zum eingefrorenen
  # Interpreter passen, sonst laedt llama_cpp nicht.
  #
  # Eigener Job statt cibuildwheel-Matrix, weil der CUDA-Build einen voellig
  # anderen Toolchain-Weg braucht als die CPU-Tokens. Wir spiegeln abetlens
  # erprobtes build-wheels-cuda.yaml 1:1:
  #   - CUDA-Toolkit per conda/mamba vom nvidia-Channel (NICHT Jimver/cuda-toolkit:
  #     dessen network-Installer crasht auf dem aktuellen Runner reproduzierbar
  #     beim EXE-Start, exit 3772776473 - Runs 28424545254 und 28424743817, noch
  #     vor jedem Subpaket).
  #   - MSVC via ilammy/msvc-dev-cmd (cl.exe + INCLUDE/LIB als Host-Compiler).
  #   - Ninja-Generator + expliziter -DCMAKE_CUDA_COMPILER=<nvcc> (kein fragiles
  #     FindCUDAToolkit-Layout-Discovery).
  #   - -allow-unsupported-compiler, weil windows-2022 ein MSVC traegt, das
  #     CUDA 12.4 offiziell nicht mehr kennt (host_config-Check).
  #   - pip wheel --no-binary :all: baut das Wheel aus dem PyPI-sdist; delvewheel
  #     vendort cudart64_12/cublas64_12/cublasLt64_12 ins Wheel (--no-mangle-all
  #     laesst die ko-gebundelten llama-DLLs unangetastet). Der NVIDIA-Treiber
  #     allein liefert cublas NICHT, daher muessen die DLLs mit ins Wheel.
  build-cuda:
    needs: setup
    name: win-amd64-cuda-cp311
    runs-on: windows-2022
    if: needs.setup.outputs.platforms == 'all' || needs.setup.outputs.platforms == 'win-cuda'
    defaults:
      run:
        shell: pwsh
    env:
      CUDA_VERSION: "12.4.1"
      # all-major deckt Maxwell..Hopper ab (inkl. sm_80 Ampere; das RTX-3080-Ti-
      # Laptop sm_86 ist binaerkompatibel zur 80er-SASS) ohne fuer jede Minor-SM
      # zu bauen.
      CUDA_ARCHS: "all-major"
    steps:
      # mamba + Python 3.11-Env "llamacpp". miniforge bringt mamba mit, die
      # Action aktiviert das Env in den Folge-Steps (pwsh).
      - name: Mamba/Conda aufsetzen (Python 3.11)
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: "llamacpp"
          python-version: "3.11"
          miniforge-version: latest
          add-pip-as-python-dependency: true
          auto-activate-base: false

      # Host-Compiler. Schreibt INCLUDE/LIB/PATH nach GITHUB_ENV; der Build-Step
      # (Kindprozess) erbt cl.exe.
      - name: MSVC aktivieren
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: CUDA-Wheel bauen (mamba CUDA + Ninja + delvewheel)
        run: |
          $ErrorActionPreference = 'Stop'
          $cudaVersion = $env:CUDA_VERSION
          $cudaChannel = "nvidia/label/cuda-$cudaVersion"
          $llamaVersion = "${{ needs.setup.outputs.version }}"

          # 1) CUDA-Toolkit ins aktive llamacpp-Env (mamba, nvidia-Channel).
          #    cuda-toolkit-Metapaket + nvcc + cudart/cublas(-dev) explizit, damit
          #    nvcc, die Header und die Runtime-DLLs sicher dabei sind.
          mamba install -y --channel-priority flexible --override-channels -c $cudaChannel `
            "${cudaChannel}::cuda-toolkit=$cudaVersion" `
            "${cudaChannel}::cuda-nvcc_win-64" `
            "${cudaChannel}::cuda-cccl" `
            "${cudaChannel}::cuda-cudart" `
            "${cudaChannel}::cuda-cudart-dev" `
            "${cudaChannel}::libcublas" `
            "${cudaChannel}::libcublas-dev"

          # 2) Pfade DYNAMISCH ableiten. Die nvidia-conda-Pakete folgen auf
          #    Windows NICHT der Library\-Konvention, sondern legen nvcc + DLLs
          #    direkt unter dem Env-Root ab (Linux-Layout, z.B. $CONDA_PREFIX\bin).
          #    Run 28425305252 ist genau an der festen Annahme
          #    $CONDA_PREFIX\Library\bin\nvcc.exe gescheitert (nvcc war installiert,
          #    nur woanders). Daher nvcc.exe rekursiv suchen und cudaBin/cudaRoot
          #    aus dem realen Fund ableiten.
          Write-Host "CONDA_PREFIX = $env:CONDA_PREFIX"
          Write-Host "--- Env-Root-Top-Level ---"
          Get-ChildItem -Path $env:CONDA_PREFIX -Directory -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Name
          $nvcc = Get-ChildItem -Path $env:CONDA_PREFIX -Recurse -Filter nvcc.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $nvcc) { throw "nvcc.exe nirgends unter $env:CONDA_PREFIX gefunden" }
          $nvccPath = $nvcc.FullName
          $cudaBin  = Split-Path $nvccPath -Parent
          $cudaRoot = Split-Path $cudaBin -Parent
          Write-Host "nvcc gefunden: $nvccPath"
          Write-Host "cudaBin  = $cudaBin"
          Write-Host "cudaRoot = $cudaRoot"
          $nvccCmake = $nvccPath.Replace('\','/')
          & $nvccPath --version

          # 3) Build-Tools ins Env. ninja.exe-Pfad an CMake durchreichen (absolut,
          #    funktioniert unabhaengig von der Build-Isolation).
          python -m pip install --upgrade pip wheel delvewheel ninja
          $ninjaPath = (Join-Path $env:CONDA_PREFIX 'Scripts\ninja.exe')
          if (-not (Test-Path $ninjaPath)) { $ninjaPath = (Get-Command ninja).Source }
          $ninjaCmake = $ninjaPath.Replace('\','/')

          # 4) Build-Umgebung. CMAKE_ARGS enthaelt den expliziten nvcc-Pfad, daher
          #    braucht CMake kein Toolkit-Discovery. AVX2 bleibt fuer den
          #    CPU-Fallback-Pfad an (kein AVX512).
          $env:CUDA_PATH = $cudaRoot
          $env:CUDA_HOME = $cudaRoot
          $env:CUDAToolkit_ROOT = $cudaRoot
          $env:CUDA_TOOLKIT_ROOT_DIR = $cudaRoot
          $env:CUDACXX = $nvccCmake
          $env:CMAKE_GENERATOR = 'Ninja'
          $env:CMAKE_MAKE_PROGRAM = $ninjaCmake
          $env:PATH = "$cudaBin;$env:PATH"
          $env:FORCE_CMAKE = '1'
          $env:CMAKE_ARGS = @(
            "-DGGML_CUDA=on",
            "-DGGML_NATIVE=OFF",
            "-DGGML_AVX2=ON",
            "-DGGML_AVX512=OFF",
            "-DCMAKE_CUDA_ARCHITECTURES=$env:CUDA_ARCHS",
            "-DCMAKE_CUDA_COMPILER=$nvccCmake",
            "-DCMAKE_MAKE_PROGRAM=$ninjaCmake",
            "-DCMAKE_CUDA_COMPILER_ARG1=-allow-unsupported-compiler",
            "-DCMAKE_CUDA_FLAGS=-allow-unsupported-compiler"
          ) -join ' '
          Write-Host "CMAKE_ARGS = $env:CMAKE_ARGS"

          # 5) Wheel aus dem PyPI-sdist bauen (von Quelle, kein prebuilt CPU-Wheel).
          New-Item -ItemType Directory -Force -Path wheelhouse_raw | Out-Null
          python -m pip wheel "llama-cpp-python==$llamaVersion" `
            --no-binary :all: --no-deps -w wheelhouse_raw --verbose
          $rawWheel = (Get-ChildItem wheelhouse_raw\*.whl | Select-Object -First 1).FullName
          if (-not $rawWheel) { throw "Kein Wheel in wheelhouse_raw gebaut" }
          Write-Host "Rohwheel: $rawWheel"

          # 6) CUDA-Runtime-DLLs ins Wheel vendoren (cudart64_12/cublas64_12/
          #    cublasLt64_12). Im Linux-Layout der nvidia-conda-Pakete liegen sie
          #    meist neben nvcc in $cudaBin; zur Sicherheit den realen Ordner der
          #    cudart-DLL suchen und alle Kandidaten in den add-path aufnehmen.
          #    --no-mangle-all laesst die ko-gebundelten libllama/libggml*-DLLs
          #    unangetastet (llama_cpp laedt sie spaeter via ctypes unter exaktem
          #    Namen, Mangling wuerde den Lookup brechen).
          #    --analyze-existing ist ZWINGEND: llama_cpp laedt ggml-cuda.dll erst
          #    zur Laufzeit per ctypes-CDLL, nicht als verlinktes .pyd. delvewheel
          #    startet seine Abhaengigkeits-Analyse aber an den .pyd-Entrypoints und
          #    erreicht die ko-gebundelte ggml-cuda.dll sonst NIE -> es wuerde
          #    "no external dependencies are needed" melden und cudart/cublas NICHT
          #    einpacken. Das Wheel waere gruen, faellt auf dem Zielrechner aber auf
          #    CPU zurueck (SPEECH-2299). --analyze-existing zwingt die Analyse der
          #    bereits im Wheel liegenden DLLs.
          #    --exclude nvcuda.dll: das ist die Treiber-API (kommt vom NVIDIA-
          #    Treiber, liegt NICHT im add-path); ohne Exclude bricht delvewheel
          #    mit "cannot find nvcuda.dll" hart ab.
          $dllDirs = @($cudaBin, (Join-Path $env:CONDA_PREFIX 'bin'), (Join-Path $env:CONDA_PREFIX 'Library\bin')) |
            Where-Object { Test-Path $_ }
          $cudartHit = Get-ChildItem -Path $env:CONDA_PREFIX -Recurse -Filter cudart64_*.dll -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($cudartHit) { $dllDirs = @($cudartHit.DirectoryName) + $dllDirs }
          $addPath = ($dllDirs | Select-Object -Unique) -join ';'
          Write-Host "delvewheel add-path = $addPath"
          New-Item -ItemType Directory -Force -Path wheelhouse | Out-Null
          delvewheel repair --analyze-existing --no-mangle-all --exclude "nvcuda.dll" --add-path "$addPath" -w wheelhouse $rawWheel
          Write-Host "=== gebaute Wheels ==="
          Get-ChildItem wheelhouse

          # 7) Verifikation: das reparierte Wheel MUSS cudart64_* und cublas64_*
          #    enthalten, sonst ist es ein stiller CPU-Fallback-Build. Hart failen,
          #    damit so ein Wheel nie nach hetzner staged wird.
          $fixed = (Get-ChildItem wheelhouse\*.whl | Select-Object -First 1).FullName
          $names = & python -c "import sys,zipfile; print('\n'.join(zipfile.ZipFile(sys.argv[1]).namelist()))" $fixed
          $hasCudart = $names -match 'cudart64_\d+\.dll'
          $hasCublas = $names -match 'cublas64_\d+\.dll'
          Write-Host "Vendor-Check: cudart=$([bool]$hasCudart) cublas=$([bool]$hasCublas)"
          if (-not ($hasCudart -and $hasCublas)) {
            Write-Host "::error::CUDA-Runtime-DLLs fehlen im Wheel (cudart=$([bool]$hasCudart), cublas=$([bool]$hasCublas)). Wheel wuerde auf CPU zurueckfallen (SPEECH-2299). Build abgebrochen."
            $names | Where-Object { $_ -match '\.dll$' } | ForEach-Object { Write-Host "  in-wheel DLL: $_" }
            exit 1
          }

      - name: Artefakt hochladen (win-amd64-cuda-cp311)
        uses: actions/upload-artifact@v4
        with:
          name: win-amd64-cuda-cp311
          path: wheelhouse/*.whl
          if-no-files-found: error
